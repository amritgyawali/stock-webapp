# =============================================================
# NEPSE Stock Analyzer — Daily Automation Pipeline
# Runs every trading day at 8:00 AM Nepal Time (UTC+5:45)
# 8:00 AM NPT = 2:15 AM UTC
# NEPSE trading days: Sunday–Thursday
# =============================================================

name: "📊 Daily NEPSE Stock Analysis"

on:
  schedule:
    # Run at 2:15 AM UTC = 8:00 AM NPT (Nepal Time)
    # Cron doesn't support day-of-week Sun-Thu directly,
    # so we run Mon-Fri in UTC (which covers Sun-Thu NPT due to timezone offset)
    # The Python script itself checks if it's a NEPSE trading day
    - cron: "15 2 * * 0-4"  # Sun-Thu UTC (aligns with Sun-Thu NPT)

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run even on non-trading days"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Dry run (test APIs only, no DB writes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  analyze-stocks:
    name: "🤖 Scrape, Analyze & Predict"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout repository
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip dependencies
      - name: "📦 Cache pip packages"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      # 5. Run the pipeline
      - name: "🚀 Run NEPSE Analysis Pipeline"
        working-directory: python
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FLAGS="$FLAGS --force"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python main.py $FLAGS

      # 6. Upload logs as artifact (for debugging)
      - name: "📋 Upload run logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: python/*.log
          retention-days: 7
